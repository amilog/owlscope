<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="np-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0d0d"/>
      <stop offset="1" stop-color="#0a0815"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#np-bg)"/>
  <rect width="1280" height="40" fill="#131313"/>
  <line x1="0" y1="40" x2="1280" y2="40" stroke="#1f1f1f"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f56"/><circle cx="40" cy="20" r="6" fill="#ffbd2e"/><circle cx="60" cy="20" r="6" fill="#27c93f"/>

  <!-- Sidebar -->
  <rect x="0" y="40" width="200" height="760" fill="#131313"/>
  <line x1="200" y1="40" x2="200" y2="800" stroke="#1f1f1f"/>
  <text x="16" y="78" fill="#fff" font-family="Inter, sans-serif" font-size="14" font-weight="600">OwlScope</text>
  <g font-family="Inter, sans-serif" font-size="13">
    <text x="36" y="118" fill="#888">Home</text>
    <text x="36" y="150" fill="#888">Timeline</text>
    <text x="36" y="182" fill="#888">Logs</text>
    <rect x="8" y="196" width="184" height="28" rx="4" fill="rgba(167,139,250,0.1)"/>
    <text x="36" y="214" fill="#a78bfa" font-weight="600">Network</text>
    <text x="170" y="214" fill="#a78bfa" text-anchor="end">12</text>
    <text x="36" y="246" fill="#888">State</text>
  </g>

  <!-- Network header columns -->
  <g font-family="Inter, sans-serif" font-size="10" fill="#888" letter-spacing="0.06em">
    <text x="216" y="78">TIME</text>
    <text x="316" y="78">METHOD</text>
    <text x="396" y="78">STATUS</text>
    <text x="476" y="78">HOST</text>
    <text x="700" y="78">PATH</text>
    <text x="1240" y="78" text-anchor="end">TIME</text>
  </g>
  <line x1="200" y1="84" x2="1280" y2="84" stroke="#1f1f1f"/>

  <!-- Selected row + inline detail -->
  <rect x="200" y="100" width="1080" height="28" fill="rgba(167,139,250,0.08)"/>
  <line x1="200" y1="100" x2="200" y2="128" stroke="#a78bfa" stroke-width="2"/>
  <g font-family="JetBrains Mono, monospace" font-size="11">
    <text x="216" y="118" fill="#888">16:51:51.367</text>
    <text x="316" y="118" fill="#c084fc">POST</text>
    <text x="396" y="118" fill="#4ade80">200</text>
    <text x="476" y="118" fill="#888">testwww.smsradar.az</text>
    <text x="700" y="118" fill="#e5e5e5">/api/adsvehicle/vehicles/multilist</text>
    <text x="1240" y="118" fill="#888" text-anchor="end">2321ms</text>
  </g>

  <!-- Inline detail card -->
  <rect x="200" y="140" width="1080" height="500" fill="#0a0a0a" stroke="#1f1f1f"/>
  <g font-family="JetBrains Mono, monospace" font-size="11">
    <text x="216" y="160" fill="#c084fc">POST</text>
    <text x="280" y="160" fill="#4ade80">200</text>
    <text x="320" y="160" fill="#888">OK</text>
    <text x="356" y="160" fill="#e5e5e5">https://testwww.smsradar.az/api/adsvehicle/vehicles/multilist</text>
    <text x="1100" y="160" fill="#888">2321ms</text>
    <rect x="1180" y="148" width="80" height="20" rx="4" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="1220" y="161" fill="#888" font-family="Inter,sans-serif" text-anchor="middle" font-size="10">cURL</text>
  </g>

  <!-- Tabs -->
  <line x1="200" y1="180" x2="1280" y2="180" stroke="#1f1f1f"/>
  <g font-family="Inter, sans-serif" font-size="12">
    <text x="216" y="201" fill="#888">Headers</text>
    <text x="280" y="201" fill="#888">Request</text>
    <text x="344" y="201" fill="#a78bfa" font-weight="500">Response</text>
    <line x1="338" y1="208" x2="404" y2="208" stroke="#a78bfa" stroke-width="2"/>
    <text x="412" y="201" fill="#888">Timing</text>
  </g>
  <line x1="200" y1="212" x2="1280" y2="212" stroke="#1f1f1f"/>

  <!-- JSON tree -->
  <g font-family="JetBrains Mono, monospace" font-size="11">
    <text x="216" y="235" fill="#888">{</text>
    <text x="232" y="255" fill="#fbbf24">"status"</text>
    <text x="296" y="255" fill="#888">:</text>
    <text x="306" y="255" fill="#4ade80">"success"</text>
    <text x="376" y="255" fill="#888">,</text>
    <text x="232" y="275" fill="#fbbf24">"limit"</text>
    <text x="296" y="275" fill="#888">:</text>
    <text x="306" y="275" fill="#60a5fa" font-weight="600">50</text>
    <text x="232" y="295" fill="#fbbf24">"count"</text>
    <text x="296" y="295" fill="#888">:</text>
    <text x="306" y="295" fill="#60a5fa" font-weight="600">165</text>
    <text x="232" y="315" fill="#fbbf24">"data"</text>
    <text x="296" y="315" fill="#888">: {</text>
    <text x="248" y="335" fill="#fbbf24">"premium_ads"</text>
    <text x="376" y="335" fill="#888">: [</text>
    <text x="408" y="335" fill="#888" opacity="0.6">5 items</text>
    <text x="248" y="355" fill="#fbbf24">"complexes"</text>
    <text x="376" y="355" fill="#888">: [</text>
    <text x="408" y="355" fill="#888" opacity="0.6">6 items</text>
    <text x="248" y="375" fill="#fbbf24">"city"</text>
    <text x="296" y="375" fill="#888">: {</text>
    <text x="316" y="375" fill="#888" opacity="0.6">id: 1, title: "Bakı", …</text>
  </g>
</svg>
