name: owlscope
description: Real-time debug & monitoring SDK for Flutter — forwards print, errors, HTTP traffic, navigation and performance events to the OwlScope desktop app over WebSocket.
version: 0.1.1
homepage: https://github.com/amilog/owlscope
repository: https://github.com/amilog/owlscope
issue_tracker: https://github.com/amilog/owlscope/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ">=2.4.5 <4.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

executables:
  setup:
  teardown:

flutter:
